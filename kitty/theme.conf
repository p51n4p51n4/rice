#fonts
font_size 11
font_family IosevkaTermSlab NFM Light
italic_font IosevkaTermSlab NFM Light Obl
bold_font IosevkaTermSlab NFM Medium
bold_italic_font IosevkaTermSlab NFM Medium Obl

#cursor
shell_integration no-cursor
cursor_shape beam
cursor_shape_unfocused beam
cursor_beam_thickness 1

#colors
cursor #ebdbb2
background #282828
foreground #ebdbb2
selection_background #665c54
selection_foreground #ebdbb2

